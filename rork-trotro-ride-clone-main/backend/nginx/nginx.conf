worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  keepalive_timeout 65;
  server_tokens off;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct="$upstream_connect_time" '
                  'uht="$upstream_header_time" urt="$upstream_response_time"';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    application/json
    application/javascript
    application/xml
    text/plain
    text/css
    text/javascript
    text/xml;

  # Rate limiting (edge layer; app also has its own limiter)
  limit_req_zone $binary_remote_addr zone=api_zone:10m rate=20r/s;
  limit_req_status 429;

  # Upstream Node API (docker service name `api` on port 4000)
  upstream trotro_api {
    # ip_hash keeps a given client pinned to one upstream — important for
    # Socket.IO when long-polling fallback is used. WebSocket upgrades work
    # either way, but pinning avoids transport handshake churn.
    ip_hash;
    server api:4000 max_fails=3 fail_timeout=10s;
    keepalive 32;
  }

  # Required for proxying WebSocket upgrades.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Cache zone for GET responses (reference data, etc.)
  proxy_cache_path /var/cache/nginx/api levels=1:2 keys_zone=api_cache:10m
                   max_size=100m inactive=60m use_temp_path=off;

  server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 2m;

    # Security headers (defence in depth on top of helmet)
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Nginx-served health (does not hit Node)
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # Pass-through to Node /health
    location = /health {
      proxy_pass http://trotro_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Main API proxy
    location /api/ {
      limit_req zone=api_zone burst=40 nodelay;

      proxy_pass http://trotro_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_connect_timeout 5s;
      proxy_send_timeout    30s;
      proxy_read_timeout    30s;

      # Buffering
      proxy_buffering on;
      proxy_buffers 16 16k;
      proxy_busy_buffers_size 32k;
    }

    # Cached GETs for reference endpoints (routes/stops). Bypass on auth.
    location ~ ^/api/(routes|stops)(/|$) {
      limit_req zone=api_zone burst=60 nodelay;

      proxy_pass http://trotro_api;
      proxy_http_version 1.1;
      proxy_set_header Connection "";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_cache api_cache;
      proxy_cache_methods GET HEAD;
      proxy_cache_key "$scheme$request_method$host$request_uri";
      proxy_cache_valid 200 30s;
      proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
      proxy_cache_bypass $http_authorization;
      proxy_no_cache     $http_authorization;
      add_header X-Cache-Status $upstream_cache_status always;
    }

    # Socket.IO — both the HTTP long-poll and WebSocket transports.
    location /socket.io/ {
      proxy_pass http://trotro_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      proxy_buffering off;
      proxy_read_timeout 3600s;
      proxy_send_timeout 3600s;
    }

    # Block everything else by default
    location / {
      return 404;
    }
  }
}
