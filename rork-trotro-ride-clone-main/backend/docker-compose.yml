version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: trotro-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-trotro}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-trotro}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: trotro-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trotro-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-4000}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/trotro}
      PGSSL: ${PGSSL:-false}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-60}
      JWT_SECRET: ${JWT_SECRET:-replace_with_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
    expose:
      - "4000"
    volumes:
      - ./src:/app/src
      - ./database:/app/database
    command: ["node", "src/server.js"]

  nginx:
    image: nginx:1.27-alpine
    container_name: trotro-nginx
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_cache:/var/cache/nginx
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trotro-migrate
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/trotro}
      PGSSL: ${PGSSL:-false}
    volumes:
      - ./database:/app/database
    command: ["node", "database/migrate.js"]

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trotro-seed
    profiles: ["tools"]
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:password@db:5432/trotro}
      PGSSL: ${PGSSL:-false}
    volumes:
      - ./database:/app/database
    command: ["node", "database/seed.js"]

volumes:
  db_data:
  nginx_cache:
  redis_data:
